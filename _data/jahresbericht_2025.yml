leitsaetze:
  - number: 1
    title: "Digitale Transformation"
    text: "BIE-Digital treibt die Digitale Transformation in Verwaltung und Stadtgesellschaft voran. Innovationen sind dabei ein wichtiger Bestandteil."

  - number: 2
    title: "Offene Innovation"
    text: "Dafür gibt es den Geschäftsbereich Innovation, in dem wir die Initiative Open Innovation City verantworten. Wir nutzen und vermitteln dafür insbesondere das Prinzip der Offenen Innovation."

  - number: 3
    title: "Experimentierräume"
    text: "Wir öffnen Denk- und Experimentierräume, um mit anderen Organisationseinheiten neue Prozesse und Technologien zu erproben. Dazu bringen wir unsere Expertise im Bereich Innovation ein. Die Fachverantwortung bleibt bei den Organisationseinheiten."

  - number: 4
    title: "Stadtgesellschaft"
    text: "Für die Stadtgesellschaft organisieren wir unterschiedliche Formate, die Zusammenarbeit, Austausch und Vernetzung fördern. Damit begegnen wir den ökonomischen, ökologischen und sozialen Herausforderungen in Bielefeld gemeinschaftlich."

  - number: 5
    title: "Innovation Office"
    text: "Das Innovation Office ist der zentrale Ort, an dem Akteure aus Verwaltung, Wirtschaft, Wissenschaft und Zivilgesellschaft gemeinsam und offen an Innovationen arbeiten."

