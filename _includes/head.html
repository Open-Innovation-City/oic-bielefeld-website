<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- SEO Meta Tags (jekyll-seo-tag) -->
    {% seo %}

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pretix.eu https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://pretix.eu; font-src 'self'; frame-src https://www.bielefeld.de https://pretix.eu https://www.youtube.com; img-src 'self' https://img.youtube.com data:; connect-src 'self' https://pretix.eu; worker-src 'self' blob:;">

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="Dn5wjZl9wLdwUXGXl2Z0-bbc-6U-5llBN-YiQ9DcYjo" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="{{ site.baseurl }}/assets/fonts/OpenSans-Regular.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- CSS - Direkte Links für GitHub Pages -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
    
    <!-- Favicon (optional) -->
    <link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/assets/images/favicon.png">
</head>
