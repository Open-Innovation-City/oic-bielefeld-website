<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">
{% include head.html %}

<body>
<main id="sound-stage" role="main" aria-label="Sound abspielen">

    <audio id="sound-audio" preload="auto"{% if page.loop %} loop{% endif %}>
        <source src="{{ site.baseurl }}/assets/sounds/{{ page.sound }}" type="audio/mpeg">
    </audio>

    <button id="sound-button" type="button" aria-label="Sound abspielen">
        <span class="sound-emoji" aria-hidden="true">{{ page.emoji | default: "🔊" }}</span>
        <span class="sound-icon" aria-hidden="true">▶</span>
    </button>

    <p id="sound-hint">Tippen zum Abspielen</p>

</main>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }
    #sound-stage {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        background: linear-gradient(135deg, #666cde 0%, #00b2bb 60%, #a5e35f 100%);
        background-size: 200% 200%;
        animation: stage-shift 12s ease infinite;
        overflow: hidden;
    }
    @keyframes stage-shift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    #sound-button {
        position: relative;
        width: 220px;
        height: 220px;
        max-width: 60vw;
        max-height: 60vw;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(6px);
        box-shadow: 0 0 0 0 rgba(255, 245, 100, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s ease, background 0.2s ease;
        animation: pulse 2s infinite;
    }
    #sound-button:hover { background: rgba(255, 255, 255, 0.25); }
    #sound-button:active { transform: scale(0.94); }
    #sound-button:focus-visible { outline: 4px solid var(--primary-yellow, #fff564); outline-offset: 6px; }

    @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(255, 245, 100, 0.6); }
        70%  { box-shadow: 0 0 0 32px rgba(255, 245, 100, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 245, 100, 0); }
    }

    .sound-emoji { font-size: 5.5rem; line-height: 1; }
    .sound-icon {
        display: none;
        font-size: 5rem;
        color: #fff;
        margin-left: 0.5rem;
    }

    /* Zustand: läuft gerade */
    #sound-stage.is-playing #sound-button { animation: none; }
    #sound-stage.is-playing .sound-emoji { animation: wiggle 0.5s ease infinite; }
    @keyframes wiggle {
        0%, 100% { transform: rotate(-8deg) scale(1.05); }
        50%      { transform: rotate(8deg) scale(1.15); }
    }

    #sound-hint, #sound-title {
        color: #fff;
        margin: 0;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.25);
    }
    #sound-hint {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.02em;
    }
    #sound-title {
        font-size: 1.05rem;
        opacity: 0.85;
    }

    @media (prefers-reduced-motion: reduce) {
        #sound-stage, #sound-button, #sound-stage.is-playing .sound-emoji { animation: none; }
    }
</style>

<script>
(function () {
    var stage  = document.getElementById('sound-stage');
    var audio  = document.getElementById('sound-audio');
    var hint   = document.getElementById('sound-hint');

    function play() {
        try { audio.currentTime = 0; } catch (e) {}
        var p = audio.play();
        if (p && typeof p.then === 'function') {
            p.then(showPlaying).catch(showBlocked);
        } else {
            showPlaying();
        }
    }

    function showPlaying() {
        stage.classList.add('is-playing');
        hint.textContent = 'Nochmal abspielen';
    }
    function showBlocked() {
        stage.classList.remove('is-playing');
        hint.textContent = 'Tippe zum Abspielen';
    }

    audio.addEventListener('ended', function () {
        if (!audio.loop) stage.classList.remove('is-playing');
    });

    // Ganze Fläche + Button starten den Sound
    stage.addEventListener('click', play);

    // Autoplay-Versuch direkt beim Öffnen (auf Mobil oft blockiert -> Tap-Fallback greift)
    play();
})();
</script>

</body>
</html>
